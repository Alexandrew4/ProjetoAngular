<div class="gerenciador-container">
  <h3>Gerenciar Categorias</h3>

  <div class="inputs-criacao-container">
    <input 
      type="text" 
      [(ngModel)]="novoNome" 
      placeholder="Nome da categoria..." 
      class="custom-input"
      (keyup.enter)="adicionar()"
    />
    
    <select [(ngModel)]="tipoSelecionado" class="custom-input select-tipo">
      <option value="despesa">Despesa</option>
      <option value="receita">Receita</option>
      <option value="investimento">Investimento</option>
    </select>
    
    <button class="btn-criar" (click)="adicionar()">Criar</button>
  </div>

  <table class="tabela-categorias">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Vínculo (Tipo)</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      @for (cat of categoriaService.categorias(); track cat.id) {
        <tr [class.linha-editando]="idEmEdicao() === cat.id">
          
          <td>
            @if (idEmEdicao() !== cat.id) {
              <span class="nome-categoria">{{ cat.nome }}</span>
            } @else {
              <input 
                type="text" 
                [(ngModel)]="nomeEdicao" 
                class="input-edicao"
                (keyup.enter)="salvarEdicao()"
                (keyup.escape)="cancelarEdicao()"
                focusOnInit
              />
            }
          </td>
          
          <td>
            <span class="badge" [ngClass]="cat.tipo">
              {{ cat.tipo | titlecase }}
            </span>
          </td>
          
          <td>
            @if (idEmEdicao() !== cat.id) {
              <div class="acoes-buttons">
                <button class="btn-tabela btn-editar" (click)="iniciarEdicao(cat)">
                  Editar
                </button>
                <button class="btn-tabela btn-excluir" (click)="deletar(cat.id)">
                  Excluir
                </button>
              </div>
            } @else {
              <div class="acoes-buttons">
                <button class="btn-tabela btn-sucesso" (click)="salvarEdicao()">✓</button>
                <button class="btn-tabela btn-cancelar-tab" (click)="cancelarEdicao()">✕</button>
              </div>
            }
          </td>

        </tr>
      } @empty {
        <tr>
          <td colspan="3" class="tabela-vazia">Nenhuma categoria cadastrada ainda.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
